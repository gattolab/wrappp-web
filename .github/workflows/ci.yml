name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. your-org/wrappp-web

jobs:
  # ── 1. Lint & type-check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── 2. Build (Next.js) ──────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE || 'https://api.wrappp.link' }}
          NEXT_PUBLIC_REDIRECT_BASE: ${{ vars.NEXT_PUBLIC_REDIRECT_BASE || 'https://go.wrappp.link' }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1

  # ── 3. Docker build & push ──────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: self-hosted
    needs: build
    # Only push on pushes to main or develop (not on PRs)
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Reuse the existing builder on the runner if present,
          # otherwise create a new one.
          driver: docker-container
          use: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch name  →  ghcr.io/org/wrappp-web:main
            type=ref,event=branch
            # git short SHA →  ghcr.io/org/wrappp-web:sha-a1b2c3d
            type=sha,prefix=sha-,format=short
            # semver tag    →  ghcr.io/org/wrappp-web:1.2.3  (when you push a tag)
            type=semver,pattern={{version}}
            # latest only on main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE || 'https://api.wrappp.link' }}
            NEXT_PUBLIC_REDIRECT_BASE=${{ vars.NEXT_PUBLIC_REDIRECT_BASE || 'https://go.wrappp.link' }}
          # Local directory cache — much faster on a persistent self-hosted runner
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max
          provenance: false

      # Rotate the cache so it never grows unbounded
      - name: Rotate Buildx cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true
