name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & type-check (Next.js pre-flight) ───────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── 2. Next.js build verification (pre-flight) ──────────────────────────────
  build:
    name: Next.js Build
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ── 3. Docker · Scan · Push · Bump Helm (reusable workflow) ─────────────────
  #
  #  Delegates to the shared CI pipeline defined in gattolab/wrappp.
  #  On every push to main/develop it will:
  #    ① build Docker image   ② run CodeQL + Trivy   ③ push to GHCR
  #    ④ bump image.tag in gattolab/infra-deployments → apps/wrappp-web/values.yaml
  #
  #  Skipped on pull requests (only lint + build run for PR checks).
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Docker · Scan · Push · Bump Helm
    needs: build
    #if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      security-events: write

    uses: gattolab/ci-workflows/.github/workflows/reusable-workflow-ci.yml@main

    with:
      app_name: wrappp-web
      deployment_path: apps/wrappp-web
      codeql_language: javascript
      unittest_command: ""
      trivy_severity: "CRITICAL,HIGH"
      fail_on_security_issues: true
      trivy_version: ${{ vars.TRIVY_VERSION }}

    secrets:
      # Fine-grained PAT with:
      #   • read:packages + write:packages  (GHCR push)
      #   • contents:write on gattolab/infra-deployments  (helm bump commit)
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
