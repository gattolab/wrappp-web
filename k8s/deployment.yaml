apiVersion: apps/v1
kind: Deployment
metadata:
  name: wrappp-web
  namespace: default
  labels:
    app: wrappp-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wrappp-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime deploys
  template:
    metadata:
      labels:
        app: wrappp-web
    spec:
      # Ensure pods spread across nodes
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: wrappp-web

      containers:
        - name: wrappp-web
          image: your-registry/wrappp-web:latest   # ← replace with your image
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: wrappp-web-config
          # Uncomment to inject secrets (e.g. API keys):
          # env:
          #   - name: SOME_SECRET
          #     valueFrom:
          #       secretKeyRef:
          #         name: wrappp-web-secrets
          #         key: SOME_SECRET

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Next.js writes to /tmp at runtime
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

      securityContext:
        fsGroup: 1001

      # Grace period to finish in-flight requests before pod is terminated
      terminationGracePeriodSeconds: 30
